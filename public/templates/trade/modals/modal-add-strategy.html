<div class="modal fade" id="addStrategy" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-top" role="document">   
        <div class="modal-content">
        <div class="modal-header">
            <h4 class="modal-title w-100" id="myModalLabel">ADD YOUR STRATEGY</h4>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="modal-body px-5">

            <!-- Form -->
            <form id="addStrategyForm" class="text-center" style="color: #757575;" method="POST" action="{% url 'trade:add-strategy' %}">
    
                <div class="form-row">
                    <div class="col">
                        <div class="md-form">
                            <input type="text" id="name" class="form-control">
                            <label for="name">Strategy Name</label>
                          </div>
                    </div>
                </div>

                <!--Textarea with icon prefix-->
                <div class="md-form amber-textarea active-amber-textarea row">
                    <div class="col-1">
                        <i class="fas fa-pencil-alt prefix"></i>
                    </div>
                    <div class="col-11">
                        <textarea type="text" id="description" class="md-textarea form-control" rows="3"></textarea>
                        <label for="description">Strategy Short Description</label>
                    </div>
                </div>

                <!-- Submit up button -->
                <button class="btn btn-outline-info btn-rounded btn-block my-4 waves-effect z-depth-0" type="submit">Add Strategy</button>
            </form>

        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Close</button>
        </div>
        </div>
    </div>
</div>
